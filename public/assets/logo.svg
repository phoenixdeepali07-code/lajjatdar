<svg width="450" height="150" viewBox="0 0 450 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Stylized Marathi Logo based on Poster -->
  <style>
    .red { fill: #D32F2F; }
    .marathi-text { font-family: 'Martel', serif; font-weight: 900; }
  </style>

  <!-- "हॉटेल" above -->
  <text x="50" y="30" class="red marathi-text" font-size="24">हॉटेल</text>

  <!-- "लज्जतदार" with stylized flourish -->
  <g transform="translate(50, 95)">
    <!-- Main Text -->
    <text x="0" y="0" class="red marathi-text" font-size="90">लज्जतदार</text>
    
    <!-- Stylized horizontal bar (Shirorakha) with Chili Tail -->
    <path d="M-10,-75 L380,-75 Q420,-75 425,-40 Q430,-5 380,5" fill="none" class="red" stroke="#D32F2F" stroke-width="8" stroke-linecap="round" />
    
    <!-- Chili detail at the end of the tail -->
    <path d="M380,5 Q360,10 350,0" fill="none" stroke="#D32F2F" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- "चवीची मेजवानी..." below -->
  <text x="180" y="130" class="red marathi-text" font-size="28" font-style="italic">चवीची मेजवानी...</text>
</svg>
