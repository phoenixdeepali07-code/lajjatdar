<svg width="450" height="120" viewBox="0 0 450 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#B8860B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD700;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <blur stdDeviation="2" />
    </filter>
  </defs>

  <!-- Marathi Title - Styled like the restaurant sign -->
  <text x="20" y="55" font-family="'Martel', serif" font-size="52" font-weight="800" fill="url(#goldGradient)" filter="url(#shadow)" opacity="0.3">हॉटेल लज्जतदार</text>
  <text x="20" y="55" font-family="'Martel', serif" font-size="52" font-weight="800" fill="url(#goldGradient)">हॉटेल लज्जतदार</text>
  
  <!-- English Title (Simple, elegant below) -->
  <text x="22" y="90" font-family="'Playfair Display', serif" font-size="22" font-weight="600" fill="#4E342E" letter-spacing="2">HOTEL LAJJATDAR</text>
  
  <!-- Subtle Flourish line -->
  <path d="M20,105 L380,105" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-dasharray="1,5" />
</svg>
